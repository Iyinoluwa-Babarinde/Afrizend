services:
  - type: web
    name: afrizend-backend
    env: node
    plan: free
    region: ohio
    buildCommand: "cd backend && npm install && npm run build"
    startCommand: "cd backend && npm start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: afrizend-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: afrizend-db
    databaseName: afrizend
    user: afrizend_user
    plan: free
    region: ohio
