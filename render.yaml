services:
  - type: web
    name: afrizend-backend
    env: node
    plan: free
    region: ohio
    buildCommand: "cd backend && npm install && npm run build"
    startCommand: "cd backend && npm start"
    envVars:
      - key: DATABASE_URL
        value: "postgres://YOUR_USERNAME:YOUR_PASSWORD@YOUR_HOST:5432/YOUR_DB_NAME"
      - key: JWT_SECRET
        generateValue: true


